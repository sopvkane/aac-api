server:
  port: 8080

spring:
  config:
    # Load .env from project root (user.dir = dir from which JVM was started)
    import: optional:file:${user.dir}/.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aac}
    username: ${DB_USER:app}
    password: ${DB_PASS:app}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    # Set to false to tolerate checksum changes on already-applied migrations (e.g. after editing V11)
    validate-on-migrate: false

# TTS: azure (default) or elevenlabs. Override with TTS_PROVIDER env var.
tts:
  provider: ${TTS_PROVIDER:azure}

management:
  endpoints:
    web:
      exposure:
        include: health,info